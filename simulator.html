<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Block Simulator | Web3 Foundations</title>
  <meta name="description" content="Interactive Block Mining Simulator">
  <link rel="stylesheet" href="/style.css">
</head>

<body>
  <nav>
    <a href="/index.html" class="logo">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M12 2L2 22H22L12 2Z" fill="var(--primary)" />
      </svg>
      Web3 Foundations
    </a>
    <div class="nav-links">
      <a href="/index.html">Home</a>
      <a href="/concepts.html">Concepts</a>
      <a href="/prices.html">Live Prices</a>
      <a href="/simulator.html" class="active">Simulator</a>
    </div>
  </nav>

  <main>
    <div style="text-align: center; margin-bottom: 2rem;">
      <h2>Block Simulator</h2>
      <p style="color: var(--text-muted);">Learn how hashing and mining work under the hood. Type data to change the
        hash, or click Mine to find a valid nonce.</p>
    </div>

    <div class="simulator-container">
      <div class="glass-card" id="blockCard">
        <div class="input-group">
          <label for="blockNum">Block #</label>
          <input type="number" id="blockNum" value="1" />
        </div>

        <div class="input-group">
          <label for="nonce">Nonce</label>
          <input type="number" id="nonce" value="72608" />
        </div>

        <div class="input-group">
          <label for="blockData">Data</label>
          <textarea id="blockData"></textarea>
        </div>

        <div class="input-group">
          <label>Hash (SHA-256)</label>
          <div id="hashOutput" class="hash-output">0000...</div>
        </div>

        <button id="mineBtn" class="btn">Mine Block</button>
      </div>
    </div>
  </main>

  <footer>
    <p>Built with ❤️ by Rohan Desai | Arbitrum Builder Pods | <a href="https://github.com" target="_blank">GitHub</a>
    </p>
  </footer>

  <script type="module" src="/simulator.js"></script>
</body>

</html>
